# Production stack: pulls prebuilt images from the registry.
# Use overrides for build/dev:
#   - docker-compose.build.yaml : adds build contexts (CI release)
#   - docker-compose.dev.yaml   : hot-reload dev stack

services:
  # API Service
  flick-api:
    platform: linux/amd64
    image: dellixou/flick-api:${VERSION:-latest}
    container_name: flick-api
    restart: unless-stopped
    ports:
      - "15702:15702/udp"
      - "15702:15702/tcp"
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - flick

  # Web Service
  flick-web:
    platform: linux/amd64
    image: dellixou/flick-web:${VERSION:-latest}
    container_name: flick-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - flick-api
    networks:
      - flick

networks:
  flick:
    driver: bridge

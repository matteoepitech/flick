# Production stack: pulls prebuilt images from the registry.
# Use overrides for build/dev:
#   - docker-compose.build.yaml : adds build contexts (CI release)
#   - docker-compose.dev.yaml   : hot-reload dev stack

services:
  # PostgreSQL service
  flick-postgres:
    image: postgres:16-alpine
    container_name: flick-postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - flick-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - flick

  # Migrate service
  flick-migrate:
    image: ghcr.io/amacneil/dbmate:2
    command: ["up"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      DBMATE_MIGRATIONS_DIR: /db/migrations
      DBMATE_SCHEMA_FILE: /db/schema.sql
    volumes:
      - ./db:/db
    depends_on:
      flick-postgres:
        condition: service_healthy
    networks:
      - flick

  # API Service
  flick-api:
    platform: linux/amd64
    image: dellixou/flick-api:${VERSION:-latest}
    container_name: flick-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      flick-postgres:
        condition: service_healthy
      flick-migrate:
        condition: service_completed_successfully
    networks:
      - flick

  # Web Service
  flick-web:
    platform: linux/amd64
    image: dellixou/flick-web:${VERSION:-latest}
    container_name: flick-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      FLICK_SITE_ADDRESS: ${FLICK_SITE_ADDRESS:-http://localhost}
    depends_on:
      - flick-api
    networks:
      - flick

  # Reverse proxy Service
  flick-caddy:
    image: caddy:2-alpine
    container_name: flick-caddy
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      FLICK_SITE_ADDRESS: ${FLICK_SITE_ADDRESS:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - flick-caddy-data:/data
      - flick-caddy-config:/config
    depends_on:
      - flick-api
      - flick-web
    networks:
      - flick

networks:
  flick:
    driver: bridge

volumes:
  flick-postgres-data:
  flick-caddy-data:
  flick-caddy-config:

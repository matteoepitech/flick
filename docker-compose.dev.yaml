#
# Dev override:
#   - API: rebuilt from the prod Dockerfile (fast thanks to layer cache).
#          Re-run make dev after Go changes.
#   - Web: hot reload via next dev with the source bind-mounted.

services:
  # PostgreSQL service
  flick-postgres:
    image: postgres:16-alpine
    container_name: flick-postgres-dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - flick-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  # API Service
  flick-api:
    image: flick-api:dev # Give the name flick-api:dev to the image
    platform: ""
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        VERSION: dev
    container_name: flick-api-dev
    env_file:
      - .env
    depends_on:
      flick-postgres:
        condition: service_healthy

  # Web Service
  flick-web:
    image: flick-web:dev # Give the name flick-web:dev to the image
    platform: ""
    build:
      context: ./web/
      dockerfile: Dockerfile.dev
    container_name: flick-web-dev
    environment:
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./web:/app
      - flick-web-node-modules:/app/node_modules
      - flick-web-next-cache:/app/.next

volumes:
  flick-web-node-modules:
  flick-web-next-cache:
  flick-postgres-data:

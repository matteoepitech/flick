default:
  tags:
    - linux
stages:
  - build
  - mirror
  - release-cli
  - release-server

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  MIRROR_URL: "github.com/Flick-Corp/flick.git"
  BIN_NAME: "flick"

# Build Job (server / Go)
build-job:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH !~ /-noci$/ && $CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH !~ /-noci$/ && $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: "$CI_COMMIT_TAG =~ /^v/"
  script:
    - make build
  artifacts:
    paths:
      - "./build/bin/"
    expire_in: 1 hour

# Build Web Job (npm / Next.js, built inside the web docker image)
build-web-job:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH !~ /-noci$/ && $CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH !~ /-noci$/ && $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: "$CI_COMMIT_TAG =~ /^v/"
  script:
    - docker compose -f docker-compose.yaml -f docker-compose.build.yaml build flick-web

# CLI Release Job
release-cli-job:
  stage: release-cli
  needs: [build-job]
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v/"
  script:
    - git fetch origin main
    - git merge-base --is-ancestor $CI_COMMIT_SHA origin/main || { echo "Tag is not on main, aborting..."; exit 1; }
    - VERSION=$CI_COMMIT_TAG
    - SSH_DIR=$(mktemp -d)
    - cp "$FLICK_SSH_KNOWN_HOSTS" "$SSH_DIR/known_hosts"
    - cp "$FLICK_SSH_PRIVATE" "$SSH_DIR/key"
    - chmod 600 "$SSH_DIR/key"
    - SSH_OPTS="-i $SSH_DIR/key -o UserKnownHostsFile=$SSH_DIR/known_hosts"
    - echo "Deploying version $VERSION"
    - ssh $SSH_OPTS deploy@apt.d3l.tech "mkdir -p /var/www/flick/releases/$VERSION"
    - rsync -avz -e "ssh $SSH_OPTS" build/bin/ deploy@apt.d3l.tech:/var/www/flick/releases/$VERSION/
    - rsync -avz -e "ssh $SSH_OPTS" build/bin/version.json deploy@apt.d3l.tech:/var/www/flick/releases/version.json
    - rm -rf "$SSH_DIR"

# APT Repo Release Job
release-apt-job:
  stage: release-cli
  needs: [build-job]
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v/"
  script:
    - git fetch origin main
    - git merge-base --is-ancestor $CI_COMMIT_SHA origin/main || { echo "Tag is not on main, aborting..."; exit 1; }
    - export VERSION="${CI_COMMIT_TAG#v}"
    - |
      for ARCH in amd64 arm64; do
        cp "build/bin/flick-linux-${ARCH}" build/bin/flick-deb-staging
        docker run --rm -v "$PWD:/work" -w /work \
          -e VERSION="$VERSION" -e ARCH="$ARCH" \
          goreleaser/nfpm package -f nfpm.yaml -p deb -t "flick_${VERSION}_${ARCH}.deb"
      done
    - SSH_DIR=$(mktemp -d)
    - cp "$FLICK_SSH_KNOWN_HOSTS" "$SSH_DIR/known_hosts"
    - cp "$FLICK_SSH_PRIVATE" "$SSH_DIR/key"
    - chmod 600 "$SSH_DIR/key"
    - SSH_OPTS="-i $SSH_DIR/key -o UserKnownHostsFile=$SSH_DIR/known_hosts"
    - echo "Publishing flick $VERSION to the APT repository"
    - rsync -avz -e "ssh $SSH_OPTS" flick_${VERSION}_*.deb deploy@apt.d3l.tech:/tmp/
    - ssh $SSH_OPTS deploy@apt.d3l.tech "reprepro -b /var/www/flick/apt includedeb stable /tmp/flick_${VERSION}_*.deb && rm /tmp/flick_${VERSION}_*.deb"
    - rm -rf "$SSH_DIR"

# Homebrew Tap Release Job
release-brew-job:
  stage: release-cli
  needs: [build-job]
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v/"
  variables:
    HOMEBREW_TAP_REPO: "github.com/Flick-Corp/homebrew-flick.git"
  script:
    - git fetch origin main
    - git merge-base --is-ancestor $CI_COMMIT_SHA origin/main || { echo "Tag is not on main, aborting..."; exit 1; }
    - export VERSION="$CI_COMMIT_TAG"
    - echo "Publishing Homebrew formula for flick $VERSION"
    - ./scripts/gen-formula.sh flick.rb
    - TAP_DIR=$(mktemp -d)
    - git clone "https://oauth2:${MIRROR_TOKEN}@${HOMEBREW_TAP_REPO}" "$TAP_DIR"
    - mkdir -p "$TAP_DIR/Formula"
    - cp flick.rb "$TAP_DIR/Formula/flick.rb"
    - git -C "$TAP_DIR" config user.email "ci@flick.d3l.tech"
    - git -C "$TAP_DIR" config user.name "Flick CI"
    - git -C "$TAP_DIR" add Formula/flick.rb
    - git -C "$TAP_DIR" commit -m "flick ${VERSION}" || { echo "Formula unchanged, nothing to publish"; rm -rf "$TAP_DIR"; exit 0; }
    - git -C "$TAP_DIR" push origin HEAD:main
    - rm -rf "$TAP_DIR"

# Server Release Job
release-server-job:
  stage: release-server
  needs: [build-job]
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v/"
  variables:
    REGISTRY_IMAGE: docker.io/$DOCKERHUB_USER
  before_script:
    - docker info
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin docker.io
  script:
    - git fetch origin main
    - git merge-base --is-ancestor $CI_COMMIT_SHA origin/main || { echo "Tag is not on main, aborting..."; exit 1; }
    - export VERSION="$CI_COMMIT_TAG"
    - export COMMIT="$CI_COMMIT_SHORT_SHA"
    - export BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - echo "Building compose stack version $VERSION (commit=$COMMIT)"
    - make images-push
    - docker tag "$REGISTRY_IMAGE/flick-api:$VERSION" "$REGISTRY_IMAGE/flick-api:latest" # Re-tag the API
    - docker tag "$REGISTRY_IMAGE/flick-web:$VERSION" "$REGISTRY_IMAGE/flick-web:latest" # Re-tag the Web
    - docker push "$REGISTRY_IMAGE/flick-api:latest"
    - docker push "$REGISTRY_IMAGE/flick-web:latest"

# Mirror Job (code: main branch -> GitHub)
mirror-job:
  stage: mirror
  needs: [build-job]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
  script:
    - git remote remove github 2>/dev/null || true
    - git remote add github https://oauth2:${MIRROR_TOKEN}@${MIRROR_URL}
    - git push github HEAD:refs/heads/main --force

# Mirror Issues Job
mirror-issues-job:
  stage: mirror
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      allow_failure: true
  script:
    - |
      docker run --rm -v "$PWD:/work" -w /work \
        -e GITLAB_URL="$CI_SERVER_URL" \
        -e GITLAB_PROJECT_ID="$CI_PROJECT_ID" \
        -e GITLAB_TOKEN="$GITLAB_API_TOKEN" \
        -e MIRROR_URL="$MIRROR_URL" \
        -e GITHUB_TOKEN="$MIRROR_TOKEN" \
        -e MIRROR_ISSUE_LABEL="$MIRROR_ISSUE_LABEL" \
        python:3-slim python scripts/mirror-issues.py

# Mirror Release Job
mirror-release-job:
  stage: release-cli
  needs: [build-job]
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v/"
  script:
    - git fetch origin main
    - git merge-base --is-ancestor $CI_COMMIT_SHA origin/main || { echo "Tag is not on main, aborting..."; exit 1; }
    - git fetch origin "+refs/tags/*:refs/tags/*" 2>/dev/null || true
    - git remote remove github 2>/dev/null || true
    - git remote add github https://oauth2:${MIRROR_TOKEN}@${MIRROR_URL}
    - git push github "refs/tags/${CI_COMMIT_TAG}" --force
    - PREV_TAG=$(git describe --tags --abbrev=0 "${CI_COMMIT_TAG}^" 2>/dev/null || echo "")
    - if [ -n "$PREV_TAG" ]; then RANGE="${PREV_TAG}..${CI_COMMIT_TAG}"; else RANGE="$CI_COMMIT_TAG"; fi
    - export RELEASE_NOTES_FALLBACK="$(git log --no-merges --pretty=format:'- %s (%h)' $RANGE)"
    - |
      docker run --rm -v "$PWD:/work" -w /work \
        -e VERSION="$CI_COMMIT_TAG" \
        -e GITLAB_URL="$CI_SERVER_URL" \
        -e GITLAB_PROJECT_ID="$CI_PROJECT_ID" \
        -e GITLAB_TOKEN="$GITLAB_API_TOKEN" \
        -e MIRROR_URL="$MIRROR_URL" \
        -e GITHUB_TOKEN="$MIRROR_TOKEN" \
        -e RELEASE_NOTES_FALLBACK="$RELEASE_NOTES_FALLBACK" \
        python:3-slim python scripts/mirror-release.py
